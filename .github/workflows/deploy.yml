name: Deploy to vipfhos.ngrok.app

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Sandbox Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="/home/ubuntu/.nvm/versions/node/v22.13.0/bin:/home/ubuntu/.local/share/pnpm:/home/ubuntu/.local/bin:$PATH"

            echo "==> Pulling latest code..."
            cd /home/ubuntu/hostmyhtmlserv
            git fetch --all
            git reset --hard origin/main

            echo "==> Installing dependencies..."
            npm install --production

            echo "==> Restarting server with PM2..."
            pm2 restart hostmyhtmlserv || pm2 start index.js --name hostmyhtmlserv
            pm2 save

            echo "==> Deployment complete! Live at https://vipfhos.ngrok.app"
